<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake · 贪吃蛇</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- Auth -->
  <div id="auth-screen" class="screen active">
    <div class="auth-card">
      <h1>🐍 Snake</h1>
      <p class="subtitle">贪吃蛇 · 登录即玩</p>
      <div id="auth-tabs">
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>
      </div>
      <form id="auth-form">
        <input id="auth-user" type="text" placeholder="用户名" maxlength="16" autocomplete="off" required>
        <input id="auth-pass" type="password" placeholder="密码" maxlength="32" required>
        <button type="submit" id="auth-submit">登录</button>
      </form>
      <p id="auth-msg"></p>
      <p class="hint">↑↓←→ 移动 · P 暂停</p>
    </div>
  </div>
  <!-- Game -->
  <div id="game-screen" class="screen">
    <div id="game-header">
      <span id="player-name"></span>
      <span>Score: <b id="score">0</b></span>
      <span>Best: <b id="best">0</b></span>
      <button id="logout-btn">退出</button>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="game-over" class="hidden">
      <h2>Game Over</h2>
      <p>得分: <b id="final-score">0</b></p>
      <button id="restart-btn">再来一局</button>
    </div>
    <p id="pause-hint" class="hidden">⏸ 已暂停</p>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
